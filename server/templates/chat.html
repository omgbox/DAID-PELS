<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAID-PELS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="snackbar" id="snackbar"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="brand-icon">D</div>
                <span class="brand-name">DAID-PELS</span>
            </div>
            <button class="btn-new" onclick="newSession()">+ New Session</button>
        </div>
        <div class="sessions" id="sessions"></div>
        <div class="sidebar-footer">
            <button class="btn-stats" onclick="toggleStats()">📊 Stats</button>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <button class="btn-menu" onclick="toggleSidebar()">☰</button>
            <span class="topbar-title" id="topbarTitle">New Chat</span>
        </header>

        <div class="stats-panel" id="statsPanel"></div>

        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <h1>DAID-PELS</h1>
                <p>Ask me anything about books, the world, or just chat!</p>
            </div>
            <div class="typing" id="typing"><span></span><span></span><span></span></div>
        </div>

        <div class="input-area">
            <div class="input-box">
                <textarea id="input" placeholder="Ask me anything..." rows="1"></textarea>
                <div class="input-actions">
                    <button class="btn-send" id="sendBtn" onclick="send()">▶</button>
                </div>
            </div>
            <div class="input-meta">
                <span>🌐 Wikipedia + Local</span>
                <span>🧠 Neural</span>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
