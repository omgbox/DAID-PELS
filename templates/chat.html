<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAID-PELS Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #16213e;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.4em;
            color: #e94560;
        }

        .header .status {
            font-size: 0.85em;
            color: #4ecca3;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #e94560;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: #16213e;
            border-bottom-left-radius: 4px;
        }

        .message.bot .source {
            font-size: 0.75em;
            color: #4ecca3;
            margin-top: 8px;
            font-style: italic;
        }

        .input-container {
            background: #16213e;
            padding: 15px 20px;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
        }

        .input-container input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 25px;
            background: #1a1a2e;
            color: #eee;
            font-size: 1em;
            outline: none;
        }

        .input-container input::placeholder {
            color: #666;
        }

        .input-container button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: #e94560;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-container button:hover {
            background: #c73652;
        }

        .input-container button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .typing {
            display: none;
            align-self: flex-start;
            padding: 12px 16px;
            background: #16213e;
            border-radius: 18px;
        }

        .typing.show {
            display: block;
        }

        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ecca3;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .welcome h2 {
            color: #e94560;
            margin-bottom: 10px;
        }

        .welcome p {
            margin: 5px 0;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .suggestion {
            padding: 8px 16px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9em;
        }

        .suggestion:hover {
            background: #0f3460;
            border-color: #e94560;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>DAID-PELS</h1>
        <span class="status">Online</span>
    </div>

    <div class="chat-container" id="chat">
        <div class="welcome">
            <h2>DAID-PELS Chat</h2>
            <p>Ask me anything about books, the world, or just chat!</p>
            <div class="suggestions">
                <div class="suggestion" onclick="sendSuggestion('what is Python?')">What is Python?</div>
                <div class="suggestion" onclick="sendSuggestion('who created Rust?')">Who created Rust?</div>
                <div class="suggestion" onclick="sendSuggestion('what are UFOs?')">What are UFOs?</div>
                <div class="suggestion" onclick="sendSuggestion('tell me about quantum computing')">Quantum computing</div>
                <div class="suggestion" onclick="sendSuggestion('hello')">Say hello</div>
            </div>
        </div>
        <div class="typing" id="typing">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typing = document.getElementById('typing');

        // Send on Enter key
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Focus input on load
        messageInput.focus();

        function sendSuggestion(text) {
            messageInput.value = text;
            sendMessage();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;

            // Show typing indicator
            typing.classList.add('show');
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                
                // Hide typing
                typing.classList.remove('show');
                
                // Add bot response
                addMessage(data.response, 'bot');
            } catch (error) {
                typing.classList.remove('show');
                addMessage('Sorry, something went wrong. Please try again.', 'bot');
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            // Parse source attribution
            if (type === 'bot' && text.includes('— Source:')) {
                const parts = text.split('— Source:');
                div.innerHTML = `
                    <div>${parts[0].trim()}</div>
                    <div class="source">— Source:${parts[1]}</div>
                `;
            } else {
                div.textContent = text;
            }
            
            // Insert before typing indicator
            chat.insertBefore(div, typing);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
